; ===========================================================================
; LinBPQ config for the pdn-bbs mail-forwarding oracle (GB7BPQ).
;
; Derived from the proven packet.net interop fixture
; (packet.net/docker/linbpq/bpq32.cfg) plus the mail-enablement recipe in
; docs/linbpq-mail-compat.md §7.2. Same pinned m0lte/linbpq image, same
; SIMPLE=1 + Telnet + KISS-TCP-to-netsim shape; mail is enabled here and
; the message-store / linmail.cfg state is bind-mounted to
; docker/oracle/state/ so tests can assert on disk (§7.4).
;
; Exposes (host port -> container port via compose.oracle.yml):
;   - Telnet (node prompt)  127.0.0.1:8210 -> 8010   user=admin pass=admin (SYSOP)
;   - HTTP (web UI + Mail)  127.0.0.1:8208 -> 8008
;   - FBB raw TCP           127.0.0.1:8211 -> 8011   (drive FBB forwarding
;     protocol without AX.25 — §7.2 "Optionally add FBBPORT")
;
; Dials out:
;   - KISS-TCP to netsim 172.31.0.12:8202 — BPQ is the TCP client; net-sim
;     hosts the listener and bridges bytes through the simulated RF channel
;     to node a (host 127.0.0.1:8200), where our BBS / Bbs.Interop.Tests
;     attach. BPQ retries the dial, so ordering is not strict (compose
;     still has depends_on: netsim healthy, belt-and-braces).
; ===========================================================================

; SIMPLE=1 must come first — seeds sensible defaults for every global
; tunable AND enables NODE=1 + BBS=1 (see the packet.net fixture's notes).
SIMPLE=1
NODECALL=GB7BPQ
NODEALIAS=BPQ
LOCATOR=IO91WL

; --- Mail enablement (docs/linbpq-mail-compat.md §7.2) ---------------------
;
; LINMAIL: enable BPQMail in the Linux build (config.c handles the keyword
; under #ifdef LINBPQ, setting IncludesMail=TRUE — same effect as the
; `mail` command-line argument the m0lte/linbpq integration harness uses).
LINMAIL

; APPLICATION n,CMD,NewCommand,Call,Alias,Quality  [BPQ-DOC BPQCFGFile]
; - Appl number MUST stay 1 so BPQMail's default BBSApplNum=1 (and the
;   seeded linmail.cfg's BBSApplNum=1) match.
; - The Call field (GB7BPQ-1) MUST be non-empty or inbound L2 SABMs to the
;   BBS callsign are silently ignored (APPLCALL[0] stays zero) [M0LTE-IT].
;   This is what makes the BBS directly connectable over the netsim RF
;   channel as GB7BPQ-1 (BBS-on-SSID--1 convention).
APPLICATION 1,BBS,,GB7BPQ-1,BPQBBS,255

CTEXT:
GB7BPQ pdn-bbs mail-forwarding oracle
***

PORT
 ID=Telnet
 DRIVER=Telnet
 CONFIG
 TCPPORT=8010
 HTTPPORT=8008
 ; FBBPORT: inbound raw-TCP connections land directly on the BBS
 ; application (no node prompt, no telnet login) — lets a future
 ; Bbs.Interop.Tests lane drive the FBB forwarding protocol itself
 ; without standing up the AX.25 leg (§7.2).
 FBBPORT=8011
 MAXSESSIONS=10
 USER=admin,admin,GB7BPQ,,SYSOP
 ; A non-sysop user for tests that need a plain session (mirrors the
 ; packet.net fixture's netop precedent).
 USER=user,user,PDNUSR,,
ENDPORT

; KISS-TCP port to net-sim (port 2 — the ConnectScript in linmail.cfg
; dials "C 2 PDNBBS-1" through here). Block shape copied verbatim from
; the packet.net fixture's netsim port; only IP/port differ.
PORT
 ID=netsim
 TYPE=ASYNC
 PROTOCOL=KISS
 IPADDR=172.31.0.12
 TCPPORT=8202
 CHANNEL=A
 SPEED=1200
 TXDELAY=100
 FRACK=3000
 RESPTIME=1000
 RETRIES=10
 MAXFRAME=4
 PACLEN=120
 INTERLOCK=0
 MHEARD=Y
 ; QUALITY: non-zero so the port can carry NET/ROM and broadcast NODES
 ; if a future test wants routed connects (see the packet.net fixture
 ; for the full L3Code.c rationale). Harmless to plain L2 connects.
 QUALITY=192
ENDPORT
