// BPQMail config SEED for the pdn-bbs forwarding oracle (GB7BPQ-1).
//
// libconfig format. This file is copied into the writable state volume
// (/data/linmail.cfg) by the compose entrypoint shim ON FIRST BOOT ONLY —
// BPQMail auto-rewrites its config (web saves + housekeeping, via
// /dev/shm/linmail.cfg.temp + CopyFile, BBSUtilities.c:10217), so it must
// NOT be bind-mounted read-only (docs/linbpq-mail-compat.md §7.2).
//
// Content is the "proven minimal seed" from §7.2, which is itself
// validated against the real binary by m0lte/linbpq
// tests/integration/helpers/bpqmail_cfg.py (render_bpqmail_cfg) and the
// two-instance forwarding test — callsigns adapted for this oracle:
//   BBS        = GB7BPQ-1   (oracle's BBS callsign, SSID -1 convention)
//   SYSOP      = GB7BPQ
//   partner    = PDNBBS     (OUR BBS — the system under test; base call)
//
// Conventions (per §7.2 + bpqmail_cfg.py):
//   - multi-line fields are single "|"-joined strings
//   - callsign keys starting with a digit get a "*" prefix (n/a here)
//   - the BBSUsers record with flags bit 0x10 (F_BBS) is what makes
//     LinBPQ treat an inbound connect from our BBS as a forwarding
//     session AT ALL. It is keyed by the BASE callsign (no SSID): LinBPQ
//     strips the SSID on inbound AX.25 connects BEFORE the user lookup
//     (BBSUtilities.c ~10827 strlop(call,'-')), so an SSID-keyed record
//     never matches an AX.25 partner. SSID-keyed records only ever match
//     telnet/FBBPORT paths. Keying by base call is also what joins the
//     forward-queue bits to the session, which is what makes IN-SESSION
//     REVERSE work when our BBS is the caller (spec §3.11) — with the
//     SSID key the dial-in lands on an auto-created plain user and the
//     reverse scan (check_fwd_bit vs user->BBSNumber) can never match.
//     Real-world BPQ sysops must key AX.25 partners this way too (the
//     GB7RDG production snapshot confirms: all 24 records base-keyed).

main:
{
  Streams = 10;
  BBSApplNum = 1;            // must match bpq32.cfg "APPLICATION 1,BBS,..."
  BBSName = "GB7BPQ-1";
  SYSOPCall = "GB7BPQ";
  H-Route = "#23.GBR.EURO";  // oracle's hierarchical address tail
  EnableUI = 0;
  RefuseBulls = 0;
  DontHoldNewUsers = 1;      // new users usable immediately (no H state)
  DontCheckFromCall = 1;
  DontNeedHomeBBS = 1;
  DontNeedName = 1;          // skip the new-user name prompt in scripts
  AllowAnon = 1;
  MaxTXSize = 99999;
  MaxRXSize = 99999;
  Log_BBS = 1;               // logs land in /data/logs/log_YYMMDD_BBS.txt
  Log_TCP = 1;
};

BBSForwarding:
{
  // Forwarding-partner record for OUR BBS (the system under test).
  // Key MUST be the BASE callsign (see header note: AX.25 connects are
  // SSID-stripped before lookup; base-keying also enables in-session
  // reverse toward a dialling PDNBBS-1).
  PDNBBS:
  {
    TOCalls = "";
    // Personals/directed bulls AT'd "@ PDNBBS" or "@ PDNBBS-1" route to
    // this partner (the implied-AT rule also matches the partner's own
    // call — both spellings listed so smoke/tests can use either, §4.2).
    ATCalls = "PDNBBS|PDNBBS-1";
    // Flood bulletins: forward everything (WW); personals by hierarchical
    // route GBR.EURO. Same shape as the §7.2 proven seed.
    HRoutes = "WW";
    HRoutesP = "GBR.EURO";
    FWDTimes = "";                       // no time-band restriction
    // Outbound dial: direct L2 connect over bpq32.cfg port 2 (the netsim
    // KISS-TCP channel) to our BBS callsign. The future interop test
    // listens as PDNBBS-1 on netsim node a (host KISS 127.0.0.1:8200).
    ConnectScript = "C 2 PDNBBS-1";
    Enabled = 1;
    RequestReverse = 0;                  // don't dial with an empty queue
    // FBB compressed forwarding: blocked + compressed + B1 + B2 (B12F).
    // SID gates per §3.2/§4.1. UseB2Protocol = 1 is what makes the oracle,
    // when it DIALS us (the inbound direction), choose FC (B2) over FA (B1)
    // for its queued traffic AND advertise '2' in the forwarding-session SID
    // it presents to PDNBBS-1 — both required for B2ForwardingInteropTests's
    // inbound check (the oracle gate for design.md decision #7). The B1F
    // interop lane is unaffected: those tests leave our side AllowB2F off, so
    // our SID stays B1-only and the SID intersection (B2Active = our offer ∩
    // the peer SID) drops B2 → the oracle falls back to FA/B1 (verified —
    // the full Category=Interop suite stays green with UseB2Protocol = 1).
    //
    // LIVE-EDIT TRAP (docker/README "B2F oracle gate"): BPQMail rewrites
    // /data/linmail.cfg from its in-memory model on a clean shutdown, so an
    // edit-then-`docker restart` is clobbered at SIGTERM. To apply this to a
    // RUNNING oracle that pre-dates the change: `docker kill` it (SIGKILL —
    // no config save), edit /data/linmail.cfg via a throwaway container on
    // the state mount, then `docker start` (which reads the edited file). A
    // FRESH `up` seeds this file as-is, so no manual step is needed there.
    AllowBlocked = 1;
    AllowCompressed = 1;
    UseB1Protocol = 1;
    UseB2Protocol = 1;
    SendCTRLZ = 1;                       // MBL fallback terminator = Ctrl-Z
    FWDPersonalsOnly = 0;
    // Deterministic CI forwarding (§7.3): dial ~2 s after a message is
    // queued; poll every 2 s while traffic is pending.
    FWDNewImmediately = 1;
    FwdInterval = 2;
    RevFWDInterval = 0;
    MaxFBBBlock = 10000;                 // proposal-block byte cap (§4.1)
    ConTimeout = 60;
    BBSHA = "PDNBBS.#23.GBR.EURO";       // partner's full HA (flood test)
  };
};

BBSUsers:
{
  // ^-delimited: Name^Address^HomeBBS^QRA^pass^ZIP^CMSPass^lastmsg^flags^
  //   PageLen^BBSNumber^RMSSSIDBits^WebSeqNo^TimeLastConnected^Stats^LastStats
  // flags 16 = 0x10 = F_BBS — REQUIRED; keyed by BASE callsign (AX.25
  // connects are SSID-stripped before this lookup — see header note).
  PDNBBS = "BBS^^^^^^^0^16^0^1^0^0^0^^";
  // The telnet admin user (bpq32.cfg USER=admin,admin,GB7BPQ,,SYSOP).
  // flags 8 = 0x08 = F_SYSOP: BBS-sysop needs BOTH this user flag AND a
  // Secure_Session (which the node-level SYSOP telnet login provides) —
  // BBSUtilities.c:10926. Without this record BPQMail auto-creates the
  // user WITHOUT F_SYSOP and the §7.3 CI levers (`FWD <call> NOW`,
  // `DOHOUSEKEEPING`, `REROUTEMSGS`) answer "needs SYSOP status"
  // (verified live — the spec's "from 127.0.0.1 no password needed"
  // shortcut does NOT apply here because connections arrive from the
  // docker bridge gateway IP, not loopback). PageLen 0 = no paging,
  // which scripted sessions want anyway.
  GB7BPQ = "Sysop^^^^^^^0^8^0^0^0^0^0^^";
};

Housekeeping:
{
};
